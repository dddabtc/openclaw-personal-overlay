name: patch-autofix

on:
  schedule:
    - cron: '30 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Target upstream tag (e.g. v2026.4.8)'
        required: false
        type: string

concurrency:
  group: patch-autofix
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.OC_GH_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Resolve target upstream
        id: target
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.upstream_tag }}" ]; then
            TAG="${{ github.event.inputs.upstream_tag }}"
          else
            # Get latest non-deprecated version from compatibility.json
            TAG="v$(python3 -c "
          import json
          with open('compatibility.json') as f:
              d = json.load(f)
          for e in d['supported']:
              if e.get('status') != 'deprecated':
                  print(e['openclawVersion'])
                  break
          ")"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Clone upstream
        run: |
          git clone --depth 1 --branch "${{ steps.target.outputs.tag }}" \
            https://github.com/openclaw/openclaw.git /tmp/upstream

      - name: Get patch set dir
        id: patches
        run: |
          PATCH_DIR=$(python3 -c "
          import json
          with open('compatibility.json') as f:
              d = json.load(f)
          ver = '${{ steps.target.outputs.tag }}'.lstrip('v')
          for e in d['supported']:
              if e.get('openclawVersion') == ver:
                  print(e.get('patchSetDir', 'patches/3.9'))
                  break
          else:
              print('patches/3.9')
          ")
          echo "dir=$PATCH_DIR" >> "$GITHUB_OUTPUT"

      - name: Test patch application
        id: test
        run: |
          set -euo pipefail
          cd /tmp/upstream
          FAILED=()
          APPLIED=()
          for patch in ${{ github.workspace }}/${{ steps.patches.outputs.dir }}/*.patch; do
            [ -f "$patch" ] || continue
            name=$(basename "$patch")
            if git am "$patch" 2>/dev/null; then
              APPLIED+=("$name")
            else
              git am --abort 2>/dev/null || true
              FAILED+=("$name")
            fi
          done
          echo "applied=${#APPLIED[@]}" >> "$GITHUB_OUTPUT"
          echo "failed=${#FAILED[@]}" >> "$GITHUB_OUTPUT"
          echo "failed_list=$(IFS=,; echo "${FAILED[*]}")" >> "$GITHUB_OUTPUT"
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "NEEDS_FIX=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Attempt auto-rebase
        if: steps.test.outputs.NEEDS_FIX == 'true'
        run: |
          set -euo pipefail
          cd /tmp/upstream
          git checkout -- . 2>/dev/null || true
          git am --abort 2>/dev/null || true

          PATCH_DIR="${{ github.workspace }}/${{ steps.patches.outputs.dir }}"
          NEW_DIR="${{ github.workspace }}/patches-autofixed"
          mkdir -p "$NEW_DIR"

          for patch in "$PATCH_DIR"/*.patch; do
            [ -f "$patch" ] || continue
            name=$(basename "$patch")
            if git am "$patch" 2>/dev/null; then
              # Applied cleanly - generate new patch from applied state
              git format-patch -1 HEAD -o "$NEW_DIR/" --stdout > "$NEW_DIR/$name"
              git am --skip 2>/dev/null || git reset --hard HEAD~1 2>/dev/null || true
              cp "$patch" "$NEW_DIR/$name"
            else
              git am --abort 2>/dev/null || true
              echo "SKIP: $name (needs manual fix)"
              # Keep the original patch - CI will flag it
              cp "$patch" "$NEW_DIR/$name"
            fi
          done

      - name: Update patches if fixed
        if: steps.test.outputs.NEEDS_FIX == 'true'
        run: |
          set -euo pipefail
          if [ -d patches-autofixed ] && [ "$(ls -A patches-autofixed 2>/dev/null)" ]; then
            PATCH_DIR="${{ steps.patches.outputs.dir }}"
            # Increment patch set dir version
            CURRENT_VER=$(basename "$PATCH_DIR" | sed 's/[^0-9.]//g')
            NEXT_VER=$(echo "$CURRENT_VER + 0.1" | bc 2>/dev/null || echo "9.1")
            NEW_DIR="patches/${NEXT_VER}"
            mkdir -p "$NEW_DIR"
            cp patches-autofixed/* "$NEW_DIR/"
            echo "new_patch_dir=$NEW_DIR" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.test.outputs.NEEDS_FIX == 'true'
        env:
          GH_TOKEN: ${{ secrets.OC_GH_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_DIR="${{ steps.update.outputs.new_patch_dir }}"
          if [ -n "$NEW_DIR" ] && [ -d "$NEW_DIR" ]; then
            # Update compatibility.json to point to new patch dir
            python3 -c "
          import json
          ver = '${{ steps.target.outputs.tag }}'.lstrip('v')
          with open('compatibility.json') as f:
              d = json.load(f)
          for e in d['supported']:
              if e.get('openclawVersion') == ver:
                  e['patchSetDir'] = '${{ steps.update.outputs.new_patch_dir }}'
                  break
          with open('compatibility.json', 'w') as f:
              json.dump(d, f, indent=2)
          "

            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "fix(patches): auto-rebase for ${{ steps.target.outputs.tag }} (failed: ${{ steps.test.outputs.failed_list }})"
              git push origin HEAD:main
              echo "Pushed fix. CI will re-run."
            fi
          else
            echo "No fixable patches - manual intervention needed"
            echo "::warning::Patches failed: ${{ steps.test.outputs.failed_list }}"
          fi
