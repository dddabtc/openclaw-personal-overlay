name: Validate Overlay

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifact
        run: |
          gh release download overlay-v2026.3.7 -R dddabtc/openclaw-personal-overlay -p 'dist-overlay.tar.gz' -D /tmp/release-assets/ || { echo "No release found, skipping"; exit 0; }

      - name: Extract overlay
        run: |
          mkdir -p /tmp/overlay-extract
          tar xzf /tmp/release-assets/dist-overlay.tar.gz --strip-components=1 -C /tmp/overlay-extract

      - name: Validate metadata
        run: |
          python3 -c "
          import json, sys
          m = json.load(open('/tmp/overlay-extract/metadata.json'))
          ver = m.get('overlayVersion','')
          mode = m.get('mode','')
          print(f'overlayVersion: {ver}')
          print(f'mode: {mode}')
          assert ver.startswith('overlay-v'), f'FAIL: overlayVersion must start with overlay-v, got {ver}'
          assert mode == 'full-replace', f'FAIL: mode must be full-replace, got {mode}'
          print('metadata OK')
          "

      - name: Validate full-replace structure
        run: |
          DIST=/tmp/overlay-extract/payload/dist
          echo "Files in dist: $(find $DIST -type f | wc -l)"

          # entry.js must exist
          test -f "$DIST/entry.js" || { echo "FAIL: entry.js missing"; exit 1; }
          echo "entry.js: OK"

          # run-main must exist (with hash suffix)
          ls $DIST/run-main*.js >/dev/null 2>&1 || { echo "FAIL: run-main-*.js missing"; exit 1; }
          echo "run-main: OK"

          # index.js must exist
          test -f "$DIST/index.js" || { echo "FAIL: index.js missing"; exit 1; }
          echo "index.js: OK"

          # reply chunk must exist
          ls $DIST/reply-*.js >/dev/null 2>&1 || { echo "FAIL: reply-*.js missing"; exit 1; }
          echo "reply chunk: OK"

      - name: Validate no missing chunk references
        run: |
          DIST=/tmp/overlay-extract/payload/dist
          MISSING=0
          for chunk in $(grep -oP '"\./[^"]+\.js"' $DIST/index.js | tr -d '"' | sort -u); do
            if [ ! -f "$DIST/$chunk" ]; then
              echo "MISSING: $chunk"
              MISSING=$((MISSING+1))
            fi
          done
          echo "Missing chunks: $MISSING"
          [ $MISSING -eq 0 ] || { echo "FAIL: missing chunks referenced by index.js"; exit 1; }
          echo "chunk references: OK"

      - name: Verify features in reply chunk
        run: |
          DIST=/tmp/overlay-extract/payload/dist
          REPLY=$(ls $DIST/reply-*.js | head -1)
          echo "Reply chunk: $(basename $REPLY)"

          # PERSONAL BUILD (string literal, survives minification)
          PB=$(grep -c "PERSONAL BUILD" "$REPLY" || true)
          echo "PERSONAL BUILD: $PB"
          [ "$PB" -ge 1 ] || { echo "FAIL: PERSONAL BUILD not found in reply chunk"; exit 1; }

          # Main session policy blocked (error message string, survives minification)
          MSP=$(grep -c "Main session policy blocked" "$REPLY" || true)
          echo "Main session policy blocked: $MSP"
          [ "$MSP" -ge 1 ] || { echo "FAIL: exec guard error message not found"; exit 1; }

          # 21600 (sub-agent timeout)
          TO=$(grep -c "21600" "$REPLY" || true)
          echo "21600 timeout: $TO"
          [ "$TO" -ge 1 ] || { echo "FAIL: 21600 timeout not found"; exit 1; }

          # dddabtc (repo link)
          REPO=$(grep -c "dddabtc" "$REPLY" || true)
          echo "dddabtc repo: $REPO"
          [ "$REPO" -ge 1 ] || { echo "FAIL: dddabtc repo link not found"; exit 1; }

          echo "All feature checks passed"

      - name: Summary
        run: |
          echo "=== Overlay Validation Summary ==="
          echo "Release: overlay-v2026.3.7"
          echo "Mode: full-replace"
          echo "All checks: PASSED"
