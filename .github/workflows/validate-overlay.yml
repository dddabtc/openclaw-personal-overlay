name: Validate Overlay

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Extract overlay
        run: |
          mkdir -p /tmp/overlay-extract
          tar xzf dist-overlay.tar.gz -C /tmp/overlay-extract
      
      - name: Validate metadata
        run: |
          OVERLAY_VER=$(python3 -c "import json; print(json.load(open('/tmp/overlay-extract/dist-overlay/metadata.json'))['overlayVersion'])")
          echo "overlayVersion: $OVERLAY_VER"
          [[ "$OVERLAY_VER" == overlay-v* ]] || { echo "FAIL: overlayVersion must start with overlay-v"; exit 1; }
      
      - name: Validate no entry.js
        run: |
          ! find /tmp/overlay-extract/dist-overlay/ -name "entry.js" | grep . || { echo "FAIL: entry.js must not be in overlay"; exit 1; }
      
      - name: Validate index.js present
        run: |
          DIST=/tmp/overlay-extract/dist-overlay/payload/dist
          if [ ! -f "$DIST/index.js" ]; then
            echo "FAIL: index.js must be present in overlay (required to reference new reply chunk)"
            exit 1
          fi
          # Verify index.js references a reply chunk that exists in overlay
          REPLY_REF=$(grep -oP 'from "\./reply-[^"]+\.js"' "$DIST/index.js" | head -1 | grep -oP 'reply-[^"]+\.js')
          if [ -z "$REPLY_REF" ]; then
            echo "FAIL: index.js does not reference any reply chunk"
            exit 1
          fi
          if [ ! -f "$DIST/$REPLY_REF" ]; then
            echo "FAIL: index.js references $REPLY_REF but file not found in overlay"
            exit 1
          fi
          echo "OK: index.js references $REPLY_REF (present in overlay)"
      
      - name: Validate checksums
        run: |
          cd /tmp/overlay-extract/dist-overlay
          if [ -f checksums.sha256 ]; then
            sha256sum -c checksums.sha256 || { echo "FAIL: checksum mismatch"; exit 1; }
            echo "Checksums OK"
          else
            echo "No checksums.sha256 found, skipping"
          fi
      
      - name: Verify features in reply chunk
        run: |
          DIST=/tmp/overlay-extract/dist-overlay/payload/dist
          REPLY=$(ls $DIST/reply-*.js 2>/dev/null | head -1)
          if [ -z "$REPLY" ]; then
            echo "No reply chunk found in overlay"
            exit 1
          fi
          echo "Reply chunk: $REPLY"
          
          echo "=== PERSONAL BUILD ==="
          grep -c "PERSONAL BUILD" "$REPLY" || echo "0"
          
          echo "=== enforceMainSessionPolicy ==="
          grep -c "enforceMainSessionPolicy" "$REPLY" || echo "0"
          
          echo "=== sessions_spawn in error message ==="
          grep -c "sessions_spawn" "$REPLY" || echo "0"
          
          echo "=== SSH block ==="
          grep -c "isSshCommand\|SSH.*block\|ssh.*block" "$REPLY" || echo "0"
          
          echo "=== Sub-agent timeout ==="
          grep -c "21600" "$REPLY" || echo "0"
