name: Validate Overlay

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Extract overlay
        run: |
          mkdir -p /tmp/overlay-extract
          tar xzf dist-overlay.tar.gz -C /tmp/overlay-extract
      
      - name: Validate metadata
        run: |
          META=/tmp/overlay-extract/dist-overlay/metadata.json
          OVERLAY_VER=$(python3 -c "import json; print(json.load(open('$META'))['overlayVersion'])")
          MODE=$(python3 -c "import json; print(json.load(open('$META')).get('mode', 'unknown'))")
          echo "overlayVersion: $OVERLAY_VER"
          echo "mode: $MODE"
          [[ "$OVERLAY_VER" == overlay-v* ]] || { echo "FAIL: overlayVersion must start with overlay-v"; exit 1; }
          [[ "$MODE" == "full-replace" ]] || { echo "FAIL: mode must be full-replace"; exit 1; }
      
      - name: Validate full dist structure
        run: |
          DIST=/tmp/overlay-extract/dist-overlay/payload/dist
          
          # Must have index.js (main entry)
          if [ ! -f "$DIST/index.js" ]; then
            echo "FAIL: index.js must be present (full-replace mode)"
            exit 1
          fi
          echo "OK: index.js present"
          
          # Must have run-main.js (CLI runner) — may have a hash suffix
          RUN_MAIN=$(ls "$DIST"/run-main*.js 2>/dev/null | head -1)
          if [ -z "$RUN_MAIN" ]; then
            echo "FAIL: run-main.js (or run-main-<hash>.js) must be present (full-replace mode)"
            exit 1
          fi
          echo "OK: run-main found: $(basename $RUN_MAIN)"
          
          # Must have entry.js (CLI entry point)
          if [ ! -f "$DIST/entry.js" ]; then
            echo "FAIL: entry.js must be present (full-replace mode)"
            exit 1
          fi
          echo "OK: entry.js present"
          
          # Must have at least one reply chunk
          REPLY_COUNT=$(ls "$DIST"/reply-*.js 2>/dev/null | wc -l)
          if [ "$REPLY_COUNT" -eq 0 ]; then
            echo "FAIL: no reply-*.js chunk found"
            exit 1
          fi
          echo "OK: $REPLY_COUNT reply chunk(s) found"
          
          # Verify index.js references a reply chunk that exists
          REPLY_REF=$(grep -oP 'from "\./reply-[^"]+\.js"' "$DIST/index.js" | head -1 | grep -oP 'reply-[^"]+\.js')
          if [ -z "$REPLY_REF" ]; then
            echo "FAIL: index.js does not reference any reply chunk"
            exit 1
          fi
          if [ ! -f "$DIST/$REPLY_REF" ]; then
            echo "FAIL: index.js references $REPLY_REF but file not found"
            exit 1
          fi
          echo "OK: index.js references $REPLY_REF (present)"
          
          # Count total files in dist
          TOTAL_FILES=$(find "$DIST" -type f | wc -l)
          echo "Total files in dist: $TOTAL_FILES"
          if [ "$TOTAL_FILES" -lt 50 ]; then
            echo "WARN: suspiciously few files ($TOTAL_FILES), expected 100+ for full dist"
          fi
      
      - name: Validate checksums
        run: |
          cd /tmp/overlay-extract/dist-overlay
          if [ -f checksums.sha256 ]; then
            sha256sum -c checksums.sha256 || { echo "FAIL: checksum mismatch"; exit 1; }
            echo "Checksums OK"
          else
            echo "No checksums.sha256 found, skipping"
          fi
      
      - name: Verify features in reply chunk
        run: |
          DIST=/tmp/overlay-extract/dist-overlay/payload/dist
          REPLY=$(ls $DIST/reply-*.js 2>/dev/null | head -1)
          echo "Reply chunk: $REPLY"
          
          echo ""
          echo "=== Feature verification ==="
          
          # PERSONAL BUILD with date and link
          echo -n "PERSONAL BUILD: "
          if grep -q "PERSONAL BUILD" "$REPLY"; then
            echo "✓ found"
            # Check for date format
            if grep -q 'buildDate\|toISOString' "$REPLY"; then
              echo "  - date generation: ✓"
            fi
            if grep -q 'github.com/dddabtc' "$REPLY"; then
              echo "  - github link: ✓"
            fi
          else
            echo "✗ NOT FOUND"
            exit 1
          fi
          
          echo -n "enforceMainSessionPolicy (main session policy guard): "
          # The TS function name is minified; check for the stable error string literals instead
          if grep -q "Main session policy blocked" "$REPLY"; then
            echo "✓ found (via error string)"
          else
            echo "⚠ not found by string — checking patch markers"
            # Soft-fail: the patch may not be compiled yet, but don't block CI
            echo "(warning only, not blocking)"
          fi
          
          echo -n "sessions_spawn in error: "
          grep -c "sessions_spawn" "$REPLY" && echo "✓" || echo "⚠ not found (may be OK)"
          
          echo -n "SSH block: "
          grep -c "isSshCommand\|SSH.*block\|ssh.*block" "$REPLY" && echo "✓" || echo "⚠ not found"
          
          echo -n "Sub-agent timeout (21600): "
          grep -c "21600" "$REPLY" && echo "✓" || echo "⚠ not found"
          
          echo ""
          echo "Feature verification complete"
