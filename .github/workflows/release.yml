name: release

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      upstream_tag:
        required: true
        type: string
      source_run_url:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        required: true
        type: string
      upstream_tag:
        required: true
        type: string
      source_run_url:
        required: false
        type: string
        default: manual
  push:
    tags:
      - 'overlay-v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce single-token secret
        env:
          SINGLE_TOKEN: ${{ secrets.OC_GH_TOKEN }}
        run: |
          if [ -z "${SINGLE_TOKEN}" ]; then
            echo '{"error_code":"E_SINGLE_TOKEN_MISSING","required_secret":"OC_GH_TOKEN"}'
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ secrets.OC_GH_TOKEN }}

      - name: Normalize release tag
        id: normalize
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
          INPUT_UPSTREAM_TAG: ${{ inputs.upstream_tag || '' }}
          INPUT_SOURCE_RUN_URL: ${{ inputs.source_run_url || '' }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          release_tag=""
          upstream_version=""

          if [ -n "$INPUT_UPSTREAM_TAG" ]; then
            upstream_version="${INPUT_UPSTREAM_TAG#v}"
            release_tag="overlay-v${upstream_version}"
          elif [ -n "$INPUT_RELEASE_TAG" ]; then
            release_tag="$INPUT_RELEASE_TAG"
            upstream_version="${release_tag#overlay-v}"
          elif [ "$EVENT_NAME" = "release" ] && [ -n "$EVENT_RELEASE_TAG" ]; then
            release_tag="$EVENT_RELEASE_TAG"
            upstream_version="${release_tag#overlay-v}"
          else
            release_tag="$REF_NAME"
            upstream_version="${release_tag#overlay-v}"
          fi

          if [[ "$release_tag" != overlay-v* ]]; then
            echo "Unexpected release tag format: $release_tag" >&2
            exit 1
          fi

          if [ -z "$upstream_version" ] || [ "$upstream_version" = "$release_tag" ]; then
            echo "Failed to derive upstream version from tag: $release_tag" >&2
            exit 1
          fi

          source_run_url="$INPUT_SOURCE_RUN_URL"
          if [ -z "$source_run_url" ]; then
            source_run_url="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"
          fi

          echo "upstream_version=${upstream_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "source_run_url=${source_run_url}" >> "$GITHUB_OUTPUT"

      - name: Resolve compatibility target
        id: compat
        env:
          UPSTREAM_VERSION: ${{ steps.normalize.outputs.upstream_version }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          upstream_version = os.environ["UPSTREAM_VERSION"]
          with open("compatibility.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          supported = data.get("supported", [])
          target = None

          for entry in supported:
              if entry.get("openclawVersion") == upstream_version and entry.get("status") != "deprecated":
                  target = entry
                  break

          if target is None:
              print(f"No supported compatibility entry found for upstream version {upstream_version}", file=sys.stderr)
              sys.exit(1)

          required = ["openclawVersion", "commitSha", "upstreamBaseCommit", "patchSetDir"]
          missing = [k for k in required if not target.get(k)]
          if missing:
              print(f"Compatibility entry missing fields: {missing}", file=sys.stderr)
              sys.exit(1)

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as gh:
              gh.write(f"target_version={target['openclawVersion']}\n")
              gh.write(f"target_commit={target['commitSha']}\n")
              gh.write(f"upstream_base={target['upstreamBaseCommit']}\n")
              gh.write(f"patch_set_dir={target['patchSetDir']}\n")
          PY

      - name: Update CHANGELOG
        env:
          RELEASE_TAG: ${{ steps.normalize.outputs.release_tag }}
          UPSTREAM_TAG: v${{ steps.normalize.outputs.upstream_version }}
          SOURCE_RUN_URL: ${{ steps.normalize.outputs.source_run_url }}
        run: |
          d="$(date -u +%Y-%m-%d)"
          if grep -q "^## ${RELEASE_TAG}" CHANGELOG.md; then
            echo "CHANGELOG already contains ${RELEASE_TAG}"
            exit 0
          fi
          cat > /tmp/changelog-entry.md <<EOF
          ## ${RELEASE_TAG} (${d})
          - auto-compat: support upstream ${UPSTREAM_TAG}
          - source run: ${SOURCE_RUN_URL}
          EOF
          cat /tmp/changelog-entry.md CHANGELOG.md > CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md

      - name: Commit changelog (skip protected main)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
            exit 0
          fi
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "main is protected; skip committing changelog directly"
            exit 0
          fi
          git commit -m "chore(release): update changelog for ${{ steps.normalize.outputs.release_tag }}"
          git push origin HEAD:${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepare patched upstream dist
        env:
          PATCH_SET_DIR: ${{ steps.compat.outputs.patch_set_dir }}
          UPSTREAM_BASE: ${{ steps.compat.outputs.upstream_base }}
        run: |
          test -d "$PATCH_SET_DIR"
          git clone --filter=blob:none --no-checkout https://github.com/openclaw/openclaw.git /tmp/openclaw-src
          cd /tmp/openclaw-src
          git checkout "$UPSTREAM_BASE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mapfile -t patch_files < <(find "${GITHUB_WORKSPACE}/${PATCH_SET_DIR}" -maxdepth 1 -type f -name '*.patch' | sort)
          if [ "${#patch_files[@]}" -eq 0 ]; then
            echo "No patch files found in ${PATCH_SET_DIR}" >&2
            exit 1
          fi
          git am "${patch_files[@]}"
          corepack enable
          pnpm install --no-frozen-lockfile
          pnpm -s build

      - name: Build dist overlay package
        env:
          OVERLAY_VERSION: ${{ steps.normalize.outputs.release_tag }}
          TARGET_VERSION: ${{ steps.compat.outputs.target_version }}
          TARGET_COMMIT: ${{ steps.compat.outputs.target_commit }}
        run: |
          scripts/build-dist-overlay.sh /tmp/openclaw-src dist-overlay

      - name: "Preflight gate: required release assets must exist"
        run: |
          set -euo pipefail
          required=(dist-overlay.tar.gz dist-overlay.tar.gz.sha256)
          for f in "${required[@]}"; do
            if [ ! -s "$f" ]; then
              echo "Missing required release asset: $f" >&2
              exit 1
            fi
          done

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.OC_GH_TOKEN }}
          RELEASE_TAG: ${{ steps.normalize.outputs.release_tag }}
        run: |
          git fetch --tags
          if ! git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            git tag "${RELEASE_TAG}"
            git push origin "${RELEASE_TAG}"
          fi
          cat > /tmp/release-notes.md <<EOF
          Auto-compat release for upstream v${{ steps.normalize.outputs.upstream_version }}.

          Source: ${{ steps.normalize.outputs.source_run_url }}
          EOF
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes-file /tmp/release-notes.md

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.OC_GH_TOKEN }}
          RELEASE_TAG: ${{ steps.normalize.outputs.release_tag }}
        run: |
          gh release upload "${RELEASE_TAG}" dist-overlay.tar.gz dist-overlay.tar.gz.sha256 --clobber

      - name: "Postflight gate: verify published release assets via GitHub API"
        env:
          GH_TOKEN: ${{ secrets.OC_GH_TOKEN }}
          RELEASE_TAG: ${{ steps.normalize.outputs.release_tag }}
        run: |
          set -euo pipefail
          names="$(gh api "repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}" --jq '.assets[].name')"
          echo "Published assets:" && echo "$names"
          echo "$names" | grep -Fx "dist-overlay.tar.gz" >/dev/null || { echo "Release missing dist-overlay.tar.gz" >&2; exit 1; }
          echo "$names" | grep -Fx "dist-overlay.tar.gz.sha256" >/dev/null || { echo "Release missing dist-overlay.tar.gz.sha256" >&2; exit 1; }
