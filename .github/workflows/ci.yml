name: ci

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable corepack
        run: corepack enable
      - name: Validate compatibility matrix
        run: python3 scripts/validate-compatibility.py compatibility.json
      - name: Resolve latest supported target
        id: compat
        run: |
          python3 - <<'PY'
          import json, os, sys
          with open('compatibility.json','r',encoding='utf-8') as f:
              supported = json.load(f).get('supported', [])
          target = next((e for e in supported if e.get('status') != 'deprecated'), None)
          if target is None:
              raise SystemExit('no supported target found')
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a', encoding='utf-8') as gh:
              gh.write(f"target_version={target['openclawVersion']}\n")
              gh.write(f"target_commit={target['commitSha']}\n")
              gh.write(f"patch_set_dir={target['patchSetDir']}\n")
          PY
      - name: Run release gate against latest supported target
        run: |
          scripts/ci-release-gate.sh \
            --version "${{ steps.compat.outputs.target_version }}" \
            --commit "${{ steps.compat.outputs.target_commit }}" \
            --patch-dir "${{ steps.compat.outputs.patch_set_dir }}"
