name: autofix

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Reason for triggering autofix
        required: false
        type: string
        default: ''
      source_run_id:
        description: Source workflow run ID that triggered this autofix
        required: false
        type: string
        default: ''
      upstream_tag:
        description: Upstream tag to target
        required: false
        type: string
        default: ''

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.OC_GH_TOKEN }}

      - name: Log autofix trigger
        run: |
          echo "reason=${{ github.event.inputs.reason }}"
          echo "source_run_id=${{ github.event.inputs.source_run_id }}"
          echo "upstream_tag=${{ github.event.inputs.upstream_tag }}"

      - name: Update compatibility.json for upstream tag
        env:
          UPSTREAM_TAG: ${{ github.event.inputs.upstream_tag }}
        run: |
          set -euo pipefail
          if [ -z "${UPSTREAM_TAG}" ]; then
            echo "No upstream_tag provided, skipping compatibility update."
            exit 0
          fi

          version="${UPSTREAM_TAG#v}"
          python3 - <<PY
          import json, os, sys
          version = os.environ['UPSTREAM_TAG'].lstrip('v')
          path = 'compatibility.json'
          with open(path, 'r', encoding='utf-8') as f:
              data = json.load(f)
          supported = data.get('supported', [])
          existing = [s for s in supported if s.get('openclawVersion') == version]
          if existing:
              print(f"Version {version} already in compatibility.json, nothing to do.")
              sys.exit(0)
          import subprocess
          result = subprocess.run(['npm', 'view', f'openclaw@{version}', 'gitHead'], capture_output=True, text=True)
          commit_sha = result.stdout.strip()
          if not commit_sha:
              print(f"WARNING: could not resolve commitSha for openclaw@{version}")
              sys.exit(1)
          # Derive patchSetDir from latest supported entry's convention
          latest_patch = None
          for s in reversed(supported):
              if s.get('patchSetDir') and s.get('status') in ('supported', 'compatible', None):
                  latest_patch = s
                  break
          # Default patchSetDir: patches/<major.minor> from version
          parts = version.split('.')
          default_patch_dir = f"patches/{parts[-1]}" if len(parts) >= 2 else f"patches/{version}"
          patch_dir = latest_patch['patchSetDir'] if latest_patch else default_patch_dir
          supported.append({
              'id': f'oc-{version}-personal-overlay',
              'openclawVersion': version,
              'commitSha': commit_sha,
              'upstreamBaseCommit': commit_sha,
              'patchSetDir': patch_dir,
              'binaryArtifact': 'dist-overlay.tar.gz',
              'atlasCompat': {'memory_search': 'expected', 'memory_get': 'expected'},
              'status': 'compatible',
              'notes': 'auto-added by autofix',
          })
          data['supported'] = supported
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write('\n')
          print(f"Added {version} to compatibility.json")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add compatibility.json
            git commit -m "chore: autofix – add ${{ github.event.inputs.upstream_tag }} to compatibility.json"
            git push
          fi
